<section class="kxc-settings">
  <h2 class="kxc-h2">モバイル表形式表示プラグイン</h2>
  <p class="kxc-desc">スマホの<strong>詳細（閲覧）画面</strong>で、テーブルを表形式で表示します。対象テーブルと表示方法を設定してください。</p>
  <p class="kxc-note">※ 数値・計算フィールドは、各フィールドのkintone側の表示設定（桁区切り・単位・小数の桁数）どおりに表示します。</p>
  <p class="kxc-note">※ 本プラグインは閲覧（詳細）画面の表示のみを変更します。編集・追加画面には影響しません。</p>

  <h3 class="kxc-h3">テーブルごとの設定</h3>
  <div id="kxc-tables" class="kxc-tables"></div>

  <div class="kxc-actions">
    <button id="kxc-save" class="kxc-btn kxc-btn--primary" type="button">保存</button>
    <button id="kxc-cancel" class="kxc-btn" type="button">キャンセル</button>
  </div>
</section>
